name: Release Android

on:
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install OpenSSL
        run: |
          sudo apt install libssl-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build for Android
        run: flutter build apk --split-per-abi --release

      - name: Upload files
        run: |
          for file in $(ls build/app/outputs/flutter-apk/*-release.apk); do
          filename="${file##*/}"
          echo "Uploading ${filename}"
          run:  actions/upload-artifact@v3 --name "${filename}" --path "${file}"
          done


